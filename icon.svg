<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  
  <!-- Monitor/Container frame -->
  <rect x="16" y="20" width="96" height="72" rx="8" fill="url(#screen)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Screen content lines (metrics) -->
  <rect x="24" y="30" width="30" height="6" rx="3" fill="#3fb950"/>
  <rect x="58" y="30" width="46" height="6" rx="3" fill="#58a6ff"/>
  
  <rect x="24" y="42" width="20" height="6" rx="3" fill="#8b949e"/>
  <rect x="48" y="42" width="56" height="6" rx="3" fill="#f85149"/>
  
  <rect x="24" y="54" width="40" height="6" rx="3" fill="#d29922"/>
  <rect x="68" y="54" width="36" height="6" rx="3" fill="#58a6ff"/>
  
  <rect x="24" y="66" width="25" height="6" rx="3" fill="#8b949e"/>
  <rect x="53" y="66" width="51" height="6" rx="3" fill="#3fb950"/>
  
  <!-- Status dot -->
  <circle cx="100" cy="28" r="6" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Docker whale simplified -->
  <path d="M64 98 L52 108 L76 108 Z" fill="#58a6ff" opacity="0.6"/>
  <ellipse cx="64" cy="100" rx="18" ry="10" fill="#58a6ff" opacity="0.8"/>
  
  <!-- Base stand -->
  <rect x="44" y="108" width="40" height="6" rx="3" fill="#e6edf3"/>
</svg>