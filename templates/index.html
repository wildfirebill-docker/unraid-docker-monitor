<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unraid Docker Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="github-dark"] { --bg: #0d1117; --card-bg: #161b22; --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e; --accent: #58a6ff; --success: #3fb950; --error: #f85149; --warning: #d29922; --shadow: rgba(0,0,0,0.3); }
        [data-theme="github-light"] { --bg: #f6f8fa; --card-bg: #ffffff; --border: #d0d7de; --text-primary: #1f2328; --text-secondary: #656d76; --accent: #0969da; --success: #1a7f37; --error: #cf222e; --warning: #9a6700; --shadow: rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
        .header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.25rem; font-weight: 600; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--success)); border-radius: 8px; }
        .header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        select { background: var(--bg); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 0.875rem; cursor: pointer; min-width: 150px; }
        .btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
        .main-content { padding: 24px; }
        #containerGrid { display: flex; flex-direction: column; gap: 16px; }
        .container-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .container-name { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.running { background: var(--success); }
        .status-dot.stopped { background: var(--error); }
        .card-toggle { background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 1rem; width: 32px; height: 32px; }
        .card-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card-info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .info-row { display: flex; gap: 8px; margin-bottom: 4px; }
        .info-label { color: var(--text-secondary); min-width: 60px; font-size: 0.8125rem; }
        .info-value { color: var(--text-primary); font-size: 0.875rem; }
        .ports-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .port-badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .metric-card { background: var(--bg); padding: 10px; border-radius: 8px; }
        .metric-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; }
        .metric-value { font-size: 1.125rem; font-weight: 600; }
        .metric-value.cpu { color: var(--accent); }
        .metric-value.ram { color: var(--warning); }
        .chart-container { height: 50px; margin-top: 8px; }
        .storage-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .storage-label { font-size: 0.8125rem; color: var(--text-secondary); }
        .storage-value { font-size: 0.875rem; color: var(--success); }
        .dir-column .dir-item { background: var(--bg); padding: 6px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        @media (max-width: 768px) { .card-columns, .card-info-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><div class="logo-icon"></div><span>Unraid Docker Monitor</span></div>
        <div class="header-controls">
            <select id="networkSelect"><option value="">All Networks</option></select>
            <select id="themeSelect">
                <option value="github-dark">GitHub Dark</option>
                <option value="github-light">GitHub Light</option>
            </select>
            <button class="btn" id="refreshBtn">Refresh</button>
        </div>
    </header>
    <main class="main-content">
        <div id="containerGrid"></div>
    </main>
    <script>
        let charts = {};
        let currentTheme = localStorage.getItem('theme') || 'github-dark';
        
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeSelect').value = currentTheme;

        async function loadContainers() {
            try {
                const res = await fetch('/api/containers');
                const containers = await res.json();
                renderContainers(containers);
            } catch(e) {
                console.error(e);
                document.getElementById('containerGrid').innerHTML = '<div class="empty-state">Failed to load containers</div>';
            }
        }

        function renderContainers(containers) {
            const grid = document.getElementById('containerGrid');
            grid.innerHTML = '';
            
            if (containers.length === 0) {
                grid.innerHTML = '<div class="empty-state">No containers found</div>';
                return;
            }
            
            containers.forEach(function(container) {
                grid.appendChild(createContainerCard(container));
            });
        }

        function createContainerCard(container) {
            const isRunning = container.state === 'running';
            const card = document.createElement('div');
            card.className = 'container-card';
            
            let portsHtml = '-';
            if (container.ports && container.ports.length > 0) {
                portsHtml = container.ports.map(function(p) {
                    return '<span class="port-badge">' + p + '</span>';
                }).join('');
            }

            let dirsHtml = '-';
            if (container.directories && container.directories.length > 0) {
                dirsHtml = container.directories.map(function(d) {
                    let src = d.source;
                    if (src.length > 30) src = src.substring(0, 30) + '...';
                    return '<div class="dir-item">' + src + ' -> ' + d.destination + '</div>';
                }).join('');
            }

            let history = { cpu: [], memory: [] };
            try {
                history = JSON.parse(container.history_json || '{"cpu":[],"memory":[]}');
            } catch(e) {}

            const chartIdCpu = 'chart-cpu-' + container.short_id;
            const chartIdRam = 'chart-ram-' + container.short_id;
            const statusColor = isRunning ? 'var(--success)' : 'var(--error)';

            card.innerHTML = 
                '<div class="card-header">' +
                    '<div class="container-name">' +
                        '<span class="status-dot ' + (isRunning ? 'running' : 'stopped') + '"></span>' +
                        '<span>' + container.name + '</span>' +
                    '</div>' +
                    '<button class="card-toggle" data-id="' + container.short_id + '">-</button>' +
                '</div>' +
                '<div class="card-info-section">' +
                    '<div class="info-column">' +
                        '<div class="info-row"><span class="info-label">Image:</span><span class="info-value">' + container.image + '</span></div>' +
                        '<div class="info-row"><span class="info-label">Status:</span><span class="info-value" style="color:' + statusColor + '">' + container.status + '</span></div>' +
                        '<div class="info-row"><span class="info-label">Ports:</span><div class="ports-list">' + portsHtml + '</div></div>' +
                    '</div>' +
                    '<div class="dir-column">' +
                        '<div class="info-label">Directories:</div>' + dirsHtml +
                    '</div>' +
                '</div>' +
                '<div class="card-columns">' +
                    '<div class="metric-card">' +
                        '<div class="metric-label">CPU Usage</div>' +
                        '<div class="metric-value cpu">' + container.stats.cpu_percent.toFixed(1) + '%</div>' +
                        '<div class="chart-container"><canvas id="' + chartIdCpu + '"></canvas></div>' +
                    '</div>' +
                    '<div class="metric-card">' +
                        '<div class="metric-label">RAM Usage</div>' +
                        '<div class="metric-value ram">' + container.memory_display + ' / ' + container.memory_limit_display + '</div>' +
                        '<div class="chart-container"><canvas id="' + chartIdRam + '"></canvas></div>' +
                    '</div>' +
                '</div>' +
                '<div class="storage-section">' +
                    '<span class="storage-label">Storage:</span>' +
                    '<span class="storage-value">' + container.storage_display + '</span>' +
                '</div>';

            setTimeout(function() {
                createChart(chartIdCpu, history.cpu, '#58a6ff');
                createChart(chartIdRam, history.memory, '#d29922');
            }, 100);

            return card;
        }

        function createChart(canvasId, data, color) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            
            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(function(_, i) { return i; }),
                    datasets: [{
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '33',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: false },
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } },
                    animation: { duration: 300 }
                }
            });
        }

        document.getElementById('themeSelect').addEventListener('change', function(e) {
            currentTheme = e.target.value;
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
        });

        document.getElementById('refreshBtn').addEventListener('click', loadContainers);

        loadContainers();
        setInterval(loadContainers, 30000);
    </script>
</body>
</html>
