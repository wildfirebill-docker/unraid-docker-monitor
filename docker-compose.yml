version: '3.8'

services:
  unraid-docker-monitor:
    build: .
    container_name: unraid-docker-monitor
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - monitor

networks:
  monitor:
    driver: bridge
